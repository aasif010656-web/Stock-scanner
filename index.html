<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Stock Scanner">

<style>
:root{
  --bg:#12151A; --panel:#1B1F27; --border:#23272F; --border2:#2A2F38;
  --text:#E8E6E1; --muted:#8A8F98; --dim:#6B7280; --accent:#F2B705; --accent-dim:rgba(242,183,5,0.12);
  --green:#3DDC84; --red:#E85D5D;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
#app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;padding-bottom:64px;}
.header{padding:16px 16px 10px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--bg);z-index:10;}
.header-title{display:flex;align-items:center;gap:8px;font-weight:700;font-size:18px;}
.header-sub{font-size:12px;color:var(--muted);margin-top:3px;}
.section{padding:14px 16px;}
input[type=text],input[type=number]{
  width:100%;background:var(--panel);border:1px solid var(--border2);border-radius:10px;
  padding:11px 12px;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;outline:none;
}
input[type=text]:focus,input[type=number]:focus{border-color:var(--accent);}
button{font-family:'Inter',sans-serif;cursor:pointer;border:none;}
.btn{
  background:var(--panel);border:1px solid var(--border2);color:var(--text);
  border-radius:10px;padding:11px 14px;font-size:14px;font-weight:600;
}
.btn-accent{background:var(--accent);color:#12151A;border:1px solid var(--accent);}
.btn-ghost{background:transparent;border:1px solid var(--border2);color:var(--muted);}
.btn-row{display:flex;gap:8px;}
.btn-row .btn{flex:1;}
#reader{border-radius:12px;overflow:hidden;border:1px solid var(--border2);}
#reader video{border-radius:12px;}
.card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.product-title{font-weight:700;font-size:15px;line-height:1.35;margin-bottom:6px;}
.chip-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
.chip{font-size:11px;color:var(--muted);background:var(--border);border-radius:6px;padding:3px 8px;}
.chip-accent{font-size:11px;color:var(--accent);background:var(--accent-dim);border-radius:6px;padding:3px 8px;}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 12px;margin-top:10px;padding-top:10px;border-top:1px solid var(--border);}
.detail-label{font-size:9.5px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px;}
.detail-value{font-size:12.5px;word-break:break-word;}
.qty-box{display:flex;align-items:center;gap:10px;margin:12px 0;}
.qty-stepper{display:flex;align-items:center;background:var(--border);border-radius:10px;overflow:hidden;}
.qty-stepper button{background:var(--panel);color:var(--accent);font-size:18px;width:40px;height:40px;font-weight:700;}
.qty-stepper input{width:60px;text-align:center;background:transparent;border:none;color:var(--text);font-size:16px;font-weight:600;}
.mode-toggle{display:flex;background:var(--border);border-radius:20px;padding:3px;}
.mode-toggle button{flex:1;border-radius:18px;padding:6px 10px;font-size:12px;font-weight:600;background:transparent;color:var(--muted);}
.mode-toggle button.active{background:var(--accent);color:#12151A;}
.toast{
  position:fixed;bottom:78px;left:50%;transform:translateX(-50%);
  background:var(--green);color:#0A0F0A;padding:10px 18px;border-radius:20px;font-weight:700;font-size:13px;
  box-shadow:0 6px 20px rgba(0,0,0,.4);z-index:50;opacity:0;transition:opacity .25s, transform .25s;pointer-events:none;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px);}
.toast.err{background:var(--red);color:#fff;}
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;background:var(--panel);border-top:1px solid var(--border);
  display:flex;max-width:520px;margin:0 auto;z-index:20;
}
.bottom-nav button{flex:1;background:transparent;color:var(--muted);padding:10px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:600;}
.bottom-nav button.active{color:var(--accent);}
.empty{text-align:center;color:var(--dim);font-size:13px;padding:40px 16px;}
.search-wrap{position:relative;margin-bottom:10px;}
.search-wrap svg{position:absolute;left:12px;top:12px;}
.search-wrap input{padding-left:36px;}
.sort-row{display:flex;gap:8px;margin:0 0 10px;}
.sort-btn{font-size:12px;color:var(--muted);background:var(--panel);border:1px solid var(--border2);border-radius:20px;padding:5px 12px;}
.sort-btn.active{background:var(--accent);color:#12151A;font-weight:700;border-color:var(--accent);}
.brand-card{display:flex;align-items:center;gap:10px;background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;}
.brand-name{font-weight:600;font-size:14px;}
.brand-meta{font-size:11.5px;color:var(--muted);margin-top:3px;}
.count-badge{background:var(--border);color:var(--accent);font-weight:700;font-size:12px;border-radius:8px;padding:4px 9px;flex-shrink:0;}
.back-row{display:flex;align-items:center;gap:10px;}
.back-btn{background:var(--panel);border:1px solid var(--border2);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.log-item{background:var(--panel);border:1px solid var(--border);border-radius:10px;padding:11px 13px;margin-bottom:8px;}
.log-top{display:flex;justify-content:space-between;font-size:12.5px;font-weight:600;}
.log-meta{font-size:11px;color:var(--muted);margin-top:4px;}
.log-qty{font-family:'IBM Plex Mono',monospace;font-size:12px;}
.cam-status{font-size:12px;color:var(--dim);text-align:center;margin-top:8px;}
.notfound{background:rgba(232,93,93,0.1);border:1px solid rgba(232,93,93,0.3);color:#F0A0A0;border-radius:10px;padding:12px;font-size:13px;margin-bottom:10px;}
.divider-label{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin:14px 0 8px;}
#app{padding-bottom:84px;}
.bottom-nav{flex-direction:column;padding-bottom:env(safe-area-inset-bottom);}
.nav-credit{text-align:center;font-size:10px;color:var(--dim);padding:4px 0 2px;border-bottom:1px solid var(--border);letter-spacing:.02em;}
.nav-buttons{display:flex;width:100%;}
.nav-buttons button{flex:1;background:transparent;color:var(--muted);padding:9px 0 8px;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10.5px;font-weight:600;}
.nav-buttons button.active{color:var(--accent);}
.field-label{font-size:11px;color:var(--muted);margin:10px 0 4px;font-weight:600;}
.stock-edit-row{display:flex;gap:8px;align-items:center;margin-top:8px;}
.stock-edit-row input{flex:1;}
.inline-link-btn{background:transparent;border:none;color:var(--accent);font-size:12px;font-weight:700;padding:2px 0;}
.log-actions{display:flex;gap:6px;margin-top:8px;}
.log-actions button{flex:1;font-size:11.5px;padding:7px 0;}
.ref-qty-note{font-size:11px;color:var(--dim);margin-top:2px;}
.form-card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:12px;}
.search-row-log{display:flex;gap:8px;margin-bottom:10px;}
.operator-row{display:flex;align-items:center;gap:8px;margin-bottom:12px;}
.operator-label{font-size:12px;color:var(--muted);white-space:nowrap;font-weight:600;}
.operator-row input{flex:1;padding:8px 10px;font-size:13px;}
.dupwarn{background:rgba(242,183,5,0.12);border:1px solid rgba(242,183,5,0.35);color:#F2D27A;border-radius:10px;padding:11px 12px;font-size:12.5px;margin-bottom:12px;}
.backup-note{font-size:11px;color:var(--dim);margin:2px 0 14px;line-height:1.5;}
</style>
</head>

<div class="bottom-nav">

    </button>
    <button id="navLog" onclick="setTab('log')">
      <span>📋</span><span>Log</span>
    </button>
  </div>
</div>

function parseData(raw){
  const lines = raw.split("\n");
  const headers = lines[0].split("\t");
  const rows = [];
  for(let i=1;i<lines.length;i++){
    if(!lines[i]) continue;
    const cells = lines[i].split("\t");
    const obj = {};
    headers.forEach((h,idx)=>{ obj[h] = cells[idx]!==undefined?cells[idx]:""; });
    rows.push(obj);
  }
  return rows;
}
function fmtMoney(v){ const n=parseFloat(v); if(isNaN(n)) return "0.00"; return n.toLocaleString("en-IN",{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtInt(v){ const n=parseFloat(v); if(isNaN(n)) return v; return Math.round(n).toLocaleString("en-IN"); }
function esc(s){ return String(s).replace(/[&<>"']/g, c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

const ALL_ROWS = parseData(RAW_DATA);
let customProducts = [];   // user-added new products (from "Add as new product")
let BARCODE_INDEX = new Map();

function getAllRows(){ return ALL_ROWS.concat(customProducts); }

function rebuildIndex(){
  BARCODE_INDEX = new Map();
  getAllRows().forEach(r=>{
    if(r.Barcode){
      if(!BARCODE_INDEX.has(r.Barcode)) BARCODE_INDEX.set(r.Barcode, []);
      BARCODE_INDEX.get(r.Barcode).push(r);
    }
  });
}
rebuildIndex();

let stockOverrides = {};  // { barcode: correctedStockQty } -- edited only from Brands tab
let scanLog = [];         // [{id, ts, barcode, code, desc, brand, party, partyName, refQty, scannedQty, operator}]

async function loadStorage(){
  try{
    const o = await window.storage.get('stock-overrides', false);
    if(o && o.value) stockOverrides = JSON.parse(o.value);
  }catch(e){
    try{ const legacy = await window.storage.get('qty-overrides', false); if(legacy && legacy.value) stockOverrides = JSON.parse(legacy.value); }catch(e2){}
  }
  try{
    const l = await window.storage.get('scan-log', false);
    if(l && l.value) scanLog = JSON.parse(l.value);
  }catch(e){}
  try{
    const cp = await window.storage.get('custom-products', false);
    if(cp && cp.value){ customProducts = JSON.parse(cp.value); rebuildIndex(); }
  }catch(e){}
  try{

  storageReady = true;
  updateHeaderSub();

function effectiveQty(row){
  if(row.Barcode && stockOverrides.hasOwnProperty(row.Barcode)) return stockOverrides[row.Barcode];
  return parseFloat(row["Stock Qty"]) || 0;
}
function liveRefQtyForBarcode(barcode){
  const m = BARCODE_INDEX.get(barcode);
  if(!m || !m.length) return 0;
  return effectiveQty(m[0]);
}

// ---------- Sound ----------
let audioCtx = null;
function beep(freq, dur, delay){
  try{
    if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
    const t0 = audioCtx.currentTime + (delay||0);
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine"; osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.25, t0+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0+dur);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0+dur+0.02);
  }catch(e){}
}
// Success: pleasant two-tone rising beep
function playSuccessSound(){ beep(1046,0.09,0); beep(1568,0.12,0.09); }
// Not found: low harsh double buzz (clearly different from success)
function playErrorSound(){ beep(220,0.16,0); beep(160,0.20,0.14); }

// ---------- Barcode lookup ----------
function checkDuplicate(barcode){
  const prev = scanLog.find(l=>l.barcode===barcode);
  if(prev){
    const d = new Date(prev.ts);
    state.duplicateWarning = { ts: d.toLocaleDateString('en-GB') + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'}), scannedQty: prev.scannedQty };
  } else {
    state.duplicateWarning = null;
  }
}

function lookupBarcode(code){
  code = (code||"").trim();
  if(!code) return;
  const matches = BARCODE_INDEX.get(code);
  if(!matches || matches.length===0){
    state.notFoundCode = code; state.matchedRow=null; state.multiMatches=null; state.duplicateWarning=null;
    playErrorSound();
  } else if(matches.length===1){
    state.matchedRow = matches[0]; state.notFoundCode=null; state.multiMatches=null;
    state.scannedQty=1;
    checkDuplicate(matches[0].Barcode);
    playSuccessSound();
  } else {
    state.multiMatches = matches; state.matchedRow=null; state.notFoundCode=null; state.duplicateWarning=null;
  }
  render();
}

function pickMatch(idx){
  state.matchedRow = state.multiMatches[idx];
  state.multiMatches = null;
  state.scannedQty=1;
  checkDuplicate(state.matchedRow.Barcode);
  playSuccessSound();
  render();
}

function adjustScannedQty(delta){
  state.scannedQty = Math.max(0, (parseInt(state.scannedQty)||0) + delta);
  render();
}
function setScannedQty(v){
  state.scannedQty = Math.max(0, parseInt(v)||0);
}

async function saveScan(){
  const row = state.matchedRow;
  if(!row) return;
  const refQty = effectiveQty(row);
  scanLog.unshift({
    id: 'L'+Date.now()+Math.floor(Math.random()*1000),
    ts: new Date().toISOString(),
    barcode: row.Barcode, code: row.Product, desc: row.Description,
    brand: row.Brand||"OTHERS / UNBRANDED",
    party: row.Party||'', partyName: row["Party Name"]||'',
    refQty, scannedQty: (parseInt(state.scannedQty)||0),
    operator: state.operatorName||''
  });
  if(scanLog.length>2000) scanLog = scanLog.slice(0,2000);
  await saveLog();
  showToast("✓ Logged: " + esc(row.Description).slice(0,40) + " — Qty " + state.scannedQty);
  state.matchedRow = null; state.scannedQty=1; state.duplicateWarning=null;
  updateHeaderSub();
  render();
  setTimeout(()=>{ const inp=document.getElementById('manualBarcodeInput'); if(inp) inp.focus(); }, 150);
}

function cancelMatch(){
  state.matchedRow=null; state.multiMatches=null; state.notFoundCode=null; state.duplicateWarning=null;
  render();
}

  const today = new Date().toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'2-digit'}).toUpperCase();
  const newRow = {

// ---------- Camera ----------
async function startCamera(){
  try{
    if(typeof Html5Qrcode === 'undefined'){
      showToast("Camera library did not load", true);
      return;
    }
    state.cameraOn = true;
    state.torchOn = false;
    render();
    html5QrCode = new Html5Qrcode("reader", { verbose:false });
    const config = {
      fps: 12,
      qrbox: { width: 280, height: 150 },
      aspectRatio: 1.5,
      disableFlip: false,
      // Barcode formats ONLY -- QR codes are intentionally excluded
      formatsToSupport: [
        Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.EAN_8,
        Html5QrcodeSupportedFormats.UPC_A, Html5QrcodeSupportedFormats.UPC_E,
        Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39,
        Html5QrcodeSupportedFormats.CODE_93, Html5QrcodeSupportedFormats.CODABAR,
        Html5QrcodeSupportedFormats.ITF
      ]
    };
    await html5QrCode.start(
      { facingMode: "environment" },
      config,
      (decodedText)=>{
        lookupBarcode(decodedText);
      },
      ()=>{ /* ignore per-frame "not found" scan noise */ }
    );
  }catch(err){
    state.cameraOn = false;
    render();
    showToast("Camera unavailable — type the barcode manually", true);
  }
}
async function stopCamera(){
  try{ if(html5QrCode){ await html5QrCode.stop(); html5QrCode.clear(); } }catch(e){}
  state.cameraOn = false;
  state.torchOn = false;
  html5QrCode = null;
}
async function toggleCamera(){
  if(state.cameraOn) await stopCamera(); else await startCamera();
  render();
}
function torchSupported(){
  try{
    if(!html5QrCode) return false;
    const caps = html5QrCode.getRunningTrackCapabilities();
    return !!(caps && caps.torch);
  }catch(e){ return false; }
}
async function toggleTorch(){
  if(!html5QrCode) return;
  if(!torchSupported()){ showToast("Torch not supported on this device", true); return; }
  try{
    state.torchOn = !state.torchOn;
    await html5QrCode.applyVideoConstraints({ advanced: [{ torch: state.torchOn }] });
    render();
  }catch(e){
    state.torchOn = !state.torchOn;
    showToast("Could not toggle torch", true);
  }
}

// ---------- Brand explorer ----------
function buildBrandIndex(){
  const map = new Map();
  getAllRows().forEach(r=>{
    const b = (r.Brand && r.Brand.trim()) ? r.Brand.trim() : "OTHERS / UNBRANDED";
    if(!map.has(b)) map.set(b, []);
    map.get(b).push(r);
  });
  return Array.from(map.entries()).map(([brand, items])=>{
    const totalQty = items.reduce((s,r)=>s+effectiveQty(r),0);
    const totalValue = items.reduce((s,r)=>s + effectiveQty(r) * (parseFloat(r.WAC)||0), 0);
    return {brand, items, count: items.length, totalQty, totalValue};
  });
}

// ---------- Excel export (Scan Log only, fixed columns) ----------
function exportExcel(){
  if(scanLog.length===0){ showToast("No scan log entries to export", true); return; }
  const wsData = [["S.N","Code","Barcode","Product","Quantity","Scanned Quantity","Party Name"]];
  // Export oldest-first for a natural running log
  const ordered = scanLog.slice().reverse();
  ordered.forEach((l, i)=>{
    const refQty = liveRefQtyForBarcode(l.barcode);
    wsData.push([i+1, l.code, l.barcode, l.desc, refQty, l.scannedQty, l.partyName]);
  });
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [{wch:6},{wch:14},{wch:16},{wch:42},{wch:10},{wch:14},{wch:26}];
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, "Scan Log");
  const stamp = new Date().toISOString().slice(0,19).replace(/[:T]/g,"-");
  XLSX.writeFile(wb, "Scan_Log_" + stamp + ".xlsx");
  showToast("✓ Excel file downloaded");
}

  if(!confirm("Clear the entire scan log? This cannot be undone.")) return;
  scanLog = [];
  await saveLog();
  updateHeaderSub();
  render();
}

function exportBackup(){
  const backup = {
    version: 1,
    exportedAt: new Date().toISOString(),
    operatorName: state.operatorName||'',
    stockOverrides, scanLog, customProducts
  };
  try{
    const blob = new Blob([JSON.stringify(backup, null, 2)], {type:'application/json'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'PDT_Backup_' + new Date().toISOString().slice(0,19).replace(/[:T]/g,'-') + '.json';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
    showToast("✓ Backup file downloaded");
  }catch(e){
    showToast("Backup failed", true);
  }
}

  const inp = document.getElementById('restoreFileInput');
  if(inp) inp.click();

async function handleRestoreFile(fileInput){
  const file = fileInput.files && fileInput.files[0];
  if(!file) return;
  try{
    const text = await file.text();
    const data = JSON.parse(text);
    if(!data || (!data.scanLog && !data.stockOverrides && !data.customProducts)){
      showToast("This file doesn't look like a valid backup", true);
      fileInput.value = '';
      return;
    }
    if(!confirm("Restore this backup? Current data on this device will be replaced.")){
      fileInput.value = '';
      return;
    }
    stockOverrides = data.stockOverrides || {};
    scanLog = data.scanLog || [];
    customProducts = data.customProducts || [];
    state.operatorName = data.operatorName || state.operatorName || '';
    rebuildIndex();
    await saveStockOverrides();
    await saveLog();
    await saveCustomProducts();
    await saveOperatorName();
    updateHeaderSub();
    showToast("✓ Backup restored");
    render();
  }catch(e){
    showToast("Could not read backup file", true);
  }
  fileInput.value = '';
}

async function deleteLogEntry(id){
  if(!confirm("Delete this log entry?")) return;
  scanLog = scanLog.filter(l=>l.id!==id);
  await saveLog();
  updateHeaderSub();
  render();
}

function startEditLog(id, currentVal){
  state.editingLogId = id;
  state.editLogValue = currentVal;
  render();
}
function setEditLogValue(v){ state.editLogValue = v; }
function cancelEditLog(){ state.editingLogId = null; render(); }
async function saveEditLog(id){
  const val = parseInt(state.editLogValue);
  if(isNaN(val) || val<0){ showToast("Enter a valid quantity", true); return; }
  const entry = scanLog.find(l=>l.id===id);
  if(entry) entry.scannedQty = val;
  await saveLog();
  state.editingLogId = null;
  showToast("✓ Log quantity updated");
  render();
}
function setLogQuery(v){ state.logQuery = v; render(); focusPreserve('input[placeholder*="Search log"]'); }

// ---------- Render ----------
function render(){
  const c = document.getElementById('content');
  if(state.tab==='scan') c.innerHTML = renderScan();
  else if(state.tab==='brands') c.innerHTML = renderBrands();
  else c.innerHTML = renderLog();
  wireEvents();
}

function renderScan(){
  let html = '';
  html += '<div class="operator-row">';
  html += '<span class="operator-label">👤 Operator:</span>';
  html += '<input type="text" id="operatorInput" value="' + esc(state.operatorName) + '" oninput="setOperatorNameInput(this.value)" onblur="commitOperatorName()" placeholder="Your name" />';
  html += '</div>';
  html += '<div class="btn-row" style="margin-bottom:10px;">';
  html += '<button class="btn ' + (state.cameraOn?'btn-accent':'') + '" onclick="toggleCamera()">' + (state.cameraOn?'⏹ Stop Camera':'📷 Start Camera') + '</button>';
  if(state.cameraOn){
    html += '<button class="btn ' + (state.torchOn?'btn-accent':'') + '" onclick="toggleTorch()" style="flex:0 0 56px;">🔦</button>';
  }
  html += '</div>';
  if(state.cameraOn){
    html += '<div id="reader" style="width:100%;min-height:220px;"></div>';
    html += '<div class="cam-status">Point the camera at a BARCODE (QR codes are ignored)</div>';
  }
  html += '<div class="divider-label">Or type the barcode manually</div>';
  html += '<div class="search-wrap">';
  html += '<input type="text" id="manualBarcodeInput" placeholder="Type barcode and press Enter" value="' + esc(state.manualInput) + '" autocomplete="off" inputmode="numeric" />';
  html += '</div>';

  if(state.notFoundCode){
    html += '<div class="notfound">❌ Barcode <b>' + esc(state.notFoundCode) + '</b> not found in the system.</div>';
    html += '<div class="btn-row" style="margin-bottom:14px;">';
    html += '<button class="btn btn-accent" onclick="openAddProduct(\'' + esc(state.notFoundCode).replace(/'/g,"\\'") + '\')">+ Add as New Product</button>';
    html += '</div>';
  }

  if(state.duplicateWarning){
    html += '<div class="dupwarn">⚠️ Already scanned on ' + esc(state.duplicateWarning.ts) + ' — Qty logged then: ' + fmtInt(state.duplicateWarning.scannedQty) + '. You can still save again below if needed.</div>';
  }

  if(state.addProductOpen){
    const f = state.addForm;
    html += '<div class="form-card">';
    html += '<div class="product-title" style="margin-bottom:8px;">Add New Product</div>';
    html += '<div class="field-label">Barcode *</div><input type="text" value="' + esc(f.barcode) + '" oninput="setAddField(\'barcode\',this.value)" placeholder="Barcode" />';
    html += '<div class="field-label">Product Description *</div><input type="text" value="' + esc(f.description) + '" oninput="setAddField(\'description\',this.value)" placeholder="Product name / description" />';
    html += '<div class="field-label">Brand *</div><input type="text" value="' + esc(f.brand) + '" oninput="setAddField(\'brand\',this.value)" placeholder="Brand" />';
    html += '<div class="field-label">Product Code</div><input type="text" value="' + esc(f.code) + '" oninput="setAddField(\'code\',this.value)" placeholder="Internal code (optional)" />';
    html += '<div class="field-label">Opening Stock Qty</div><input type="number" value="' + esc(f.stockQty) + '" oninput="setAddField(\'stockQty\',this.value)" placeholder="0" />';
    html += '<div class="field-label">Party Code</div><input type="text" value="' + esc(f.party) + '" oninput="setAddField(\'party\',this.value)" placeholder="Party code (optional)" />';
    html += '<div class="field-label">Party Name</div><input type="text" value="' + esc(f.partyName) + '" oninput="setAddField(\'partyName\',this.value)" placeholder="Supplier / party name" />';
    html += '<div class="btn-row" style="margin-top:14px;">';
    html += '<button class="btn btn-ghost" onclick="closeAddProduct()">Cancel</button>';
    html += '<button class="btn btn-accent" onclick="saveAddProduct()">✓ Save Product</button>';
    html += '</div></div>';
  }

  if(state.multiMatches){
    html += '<div class="card"><div class="product-title">Multiple products found for this barcode — choose one:</div>';
    state.multiMatches.forEach((r,idx)=>{
      html += '<div class="brand-card" onclick="pickMatch(' + idx + ')"><div style="flex:1;"><div class="brand-name">' + esc(r.Description) + '</div><div class="brand-meta">Code ' + esc(r.Product) + '</div></div></div>';
    });
    html += '</div>';
  }

  if(state.matchedRow){
    const r = state.matchedRow;
    const qty = effectiveQty(r);
    html += '<div class="card">';
    html += '<div class="product-title">' + esc(r.Description) + '</div>';
    html += '<div class="chip-row">';
    html += '<span class="chip">Brand: ' + esc(r.Brand||"OTHERS / UNBRANDED") + '</span>';
    html += '<span class="chip">Code ' + esc(r.Product) + '</span>';
    html += '<span class="chip-accent">System Stock (ref): ' + fmtInt(qty) + '</span>';
    html += '</div>';
    html += '<div class="detail-grid">';
    html += detailRow('Barcode', r.Barcode||'-');
    html += detailRow('WAC', fmtMoney(r.WAC));
    html += detailRow('Party', r.Party||'-');
    html += detailRow('Party Name', r["Party Name"]||'-', true);
    html += detailRow('GRN Number', r["GRN Number"]||'-');
    html += detailRow('GRN Date', r["GRN Date"]||'-');
    html += '</div>';

    html += '<div class="field-label" style="margin-top:14px;">Scanned Quantity (this count)</div>';
    html += '<div class="qty-box" style="margin-top:6px;">';
    html += '<div class="qty-stepper">';
    html += '<button onclick="adjustScannedQty(-1)">−</button>';
    html += '<input type="number" id="qtyInput" value="' + state.scannedQty + '" oninput="setScannedQty(this.value)" />';
    html += '<button onclick="adjustScannedQty(1)">+</button>';
    html += '</div>';
    html += '<div class="ref-qty-note" style="flex:1;">This only adds a row to the Log. System Stock Qty in Brands is not changed by scanning.</div>';
    html += '</div>';
    html += '<div class="btn-row">';
    html += '<button class="btn btn-ghost" onclick="cancelMatch()">Cancel</button>';
    html += '<button class="btn btn-accent" onclick="saveScan()">✓ Save to Log</button>';
    html += '</div>';
    html += '</div>';
  }

  if(!state.matchedRow && !state.multiMatches && !state.notFoundCode && !state.addProductOpen){
    html += '<div class="empty">Scan a barcode or type it and press Enter.<br/>Using an external scanner gun? Just focus this input box and scan.</div>';
  }
  return html;
}

function detailRow(label, value, full){
  return '<div style="' + (full?'grid-column:1/-1;':'') + '"><div class="detail-label">' + esc(label) + '</div><div class="detail-value">' + esc(value) + '</div></div>';
}

function renderBrands(){
  if(state.selectedBrand){
    const idx = buildBrandIndex();
    const bd = idx.find(b=>b.brand===state.selectedBrand);
    if(!bd) { state.selectedBrand=null; return renderBrands(); }
    let items = bd.items;
    if(state.productQuery.trim()){
      const q = state.productQuery.trim().toLowerCase();
      items = items.filter(r => r.Description.toLowerCase().includes(q) || r.Product.toLowerCase().includes(q) || (r.Barcode||'').toLowerCase().includes(q));
    }
    let html = '<div class="back-row" style="margin-bottom:12px;">';
    html += '<button class="back-btn" onclick="closeBrand()">←</button>';
    html += '<div><div style="font-weight:700;font-size:15px;">' + esc(bd.brand) + '</div>';
    html += '<div style="font-size:11.5px;color:var(--muted);">' + bd.count + ' products · qty ' + fmtInt(bd.totalQty) + ' · value ' + fmtMoney(bd.totalValue) + '</div></div></div>';
    html += '<div class="search-wrap"><input type="text" value="' + esc(state.productQuery) + '" oninput="setProductQuery(this.value)" placeholder="Search product / barcode..." /></div>';
    if(items.length===0) html += '<div class="empty">No matching products.</div>';
    items.forEach(r=>{
      const isOpen = state.expandedSL === r.SL;
      const qty = effectiveQty(r);
      const isEditing = state.editingStockBarcode === r.Barcode;
      html += '<div class="card" style="padding:0;">';
      html += '<div style="padding:12px 14px;cursor:pointer;" onclick="toggleExpand(\'' + r.SL + '\')">';
      html += '<div class="product-title" style="margin-bottom:4px;">' + esc(r.Description) + '</div>';
      html += '<div class="chip-row" style="margin-bottom:0;">';
      html += '<span class="chip">Code ' + esc(r.Product) + '</span>';
      html += '<span class="chip-accent">Stock Qty ' + fmtInt(qty) + '</span>';
      html += '</div></div>';
      if(isOpen){
        html += '<div class="detail-grid" style="padding:0 14px 14px;">';
        html += detailRow('Barcode', r.Barcode||'-');
        html += detailRow('WAC', fmtMoney(r.WAC));
        html += detailRow('LLC', fmtMoney(r.LLC));
        html += detailRow('Party', r.Party||'-');
        html += detailRow('Party Name', r["Party Name"]||'-', true);
        html += detailRow('GRN Number', r["GRN Number"]||'-');
        html += detailRow('GRN Date', r["GRN Date"]||'-');
        html += detailRow('Sale Date', r["Sale Date"]||'-');
        html += detailRow('Age Days', r["Age Days"]);
        html += '</div>';
        html += '<div style="padding:0 14px 14px;">';
        if(isEditing){
          html += '<div class="field-label">Edit Stock Quantity</div>';
          html += '<div class="stock-edit-row">';
          html += '<input type="number" value="' + state.stockEditValue + '" oninput="setStockEditValue(this.value)" />';
          html += '<button class="btn btn-ghost" onclick="cancelEditStock()">Cancel</button>';
          html += '<button class="btn btn-accent" onclick="saveEditStock(\'' + esc(r.Barcode).replace(/'/g,"\\'") + '\')">Save</button>';
          html += '</div>';
        } else {
          html += '<button class="inline-link-btn" onclick="startEditStock(\'' + esc(r.Barcode).replace(/'/g,"\\'") + '\',' + qty + ')">✎ Edit Stock Quantity</button>';
        }
        html += '</div>';
      }
      html += '</div>';
    });
    return html;
  }

  let idx = buildBrandIndex();
  if(state.brandQuery.trim()){
    const q = state.brandQuery.trim().toLowerCase();
    idx = idx.filter(b=>b.brand.toLowerCase().includes(q));
  }
  if(state.brandSort==='count') idx.sort((a,b)=>b.count-a.count);
  else idx.sort((a,b)=>a.brand.localeCompare(b.brand));

  let html = '<div class="search-wrap"><input type="text" value="' + esc(state.brandQuery) + '" oninput="setBrandQuery(this.value)" placeholder="Search brand name..." /></div>';
  html += '<div class="sort-row">';
  html += '<button class="sort-btn ' + (state.brandSort==='count'?'active':'') + '" onclick="setBrandSort(\'count\')">Most stocked</button>';
  html += '<button class="sort-btn ' + (state.brandSort==='az'?'active':'') + '" onclick="setBrandSort(\'az\')">A–Z</button>';
  html += '</div>';
  if(idx.length===0) html += '<div class="empty">No brand matches.</div>';
  idx.forEach(b=>{
    html += '<div class="brand-card" onclick="openBrand(\'' + b.brand.replace(/'/g,"\\'") + '\')">';
    html += '<div style="flex:1;min-width:0;"><div class="brand-name">' + esc(b.brand) + '</div>';
    html += '<div class="brand-meta">qty ' + fmtInt(b.totalQty) + ' · value ' + fmtMoney(b.totalValue) + '</div></div>';
    html += '<div class="count-badge">' + b.count + '</div></div>';
  });
  return html;
}

function setBrandQuery(v){ state.brandQuery=v; render(); focusPreserve('input[placeholder*="Search brand name"]'); }
function setProductQuery(v){ state.productQuery=v; render(); focusPreserve('input[placeholder*="Search product"]'); }

function focusPreserve(sel){
  const el = document.querySelector(sel);
  if(el){ el.focus(); const v=el.value; el.value=''; el.value=v; }
}

function renderLog(){
  let html = '<div class="btn-row" style="margin-bottom:12px;">';
  html += '<button class="btn btn-accent" onclick="exportExcel()">⬇ Export as Excel</button>';
  html += '</div>';
  html += '<div class="btn-row" style="margin-bottom:8px;">';
  html += '<button class="btn" onclick="exportBackup()">💾 Backup All Data</button>';
  html += '<button class="btn" onclick="triggerRestore()">📂 Restore Backup</button>';
  html += '</div>';
  html += '<div class="backup-note">Backup saves everything on this device (stock corrections, scan log, added products) as one file — useful before switching phones or clearing the app. Restoring will replace current data with the backup file\'s data.</div>';
  html += '<div class="btn-row" style="margin-bottom:14px;">';
  html += '<button class="btn btn-ghost" onclick="clearLog()">Clear Log</button>';
  html += '</div>';
  if(scanLog.length===0){
    html += '<div class="empty">No scan log entries yet.<br/>Scan an item and save it to see history here.</div>';
    return html;
  }
  html += '<div class="search-row-log"><input type="text" value="' + esc(state.logQuery) + '" oninput="setLogQuery(this.value)" placeholder="Search log (product / barcode / party)..." /></div>';
  let logs = scanLog;
  if(state.logQuery.trim()){
    const q = state.logQuery.trim().toLowerCase();
    logs = logs.filter(l => (l.desc||'').toLowerCase().includes(q) || (l.barcode||'').toLowerCase().includes(q) || (l.partyName||'').toLowerCase().includes(q) || (l.code||'').toLowerCase().includes(q));
  }
  if(logs.length===0) html += '<div class="empty">No matching log entries.</div>';
  logs.forEach(l=>{
    const d = new Date(l.ts);
    const dstr = d.toLocaleDateString('en-GB') + ' ' + d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'});
    const isEditing = state.editingLogId === l.id;
    html += '<div class="log-item">';
    html += '<div class="log-top"><span>' + esc(l.desc) + '</span><span class="log-qty">Ref ' + l.refQty + ' · Scanned ' + l.scannedQty + '</span></div>';
    html += '<div class="log-meta">' + esc(l.brand) + ' · ' + esc(l.barcode||'-') + ' · ' + esc(l.partyName||'-') + ' · ' + dstr + (l.operator ? ' · 👤 ' + esc(l.operator) : '') + '</div>';
    if(isEditing){
      html += '<div class="stock-edit-row">';
      html += '<input type="number" value="' + state.editLogValue + '" oninput="setEditLogValue(this.value)" />';
      html += '<button class="btn btn-ghost" onclick="cancelEditLog()">Cancel</button>';
      html += '<button class="btn btn-accent" onclick="saveEditLog(\'' + l.id + '\')">Save</button>';
      html += '</div>';
    } else {
      html += '<div class="log-actions">';
      html += '<button class="btn btn-ghost" onclick="startEditLog(\'' + l.id + '\',' + l.scannedQty + ')">✎ Edit Qty</button>';
      html += '<button class="btn btn-ghost" onclick="deleteLogEntry(\'' + l.id + '\')">🗑 Delete</button>';
      html += '</div>';
    }
    html += '</div>';
  });
  return html;
}

function wireEvents(){
  const mi = document.getElementById('manualBarcodeInput');
  if(mi){
    mi.addEventListener('keydown', (e)=>{
      if(e.key==='Enter'){
        lookupBarcode(mi.value);
        mi.value='';
      }
    });
  }
}

// ---------- Init ----------
(async function init(){
  await loadStorage();
  render();
})();
</script>
</body>
</html>
